<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gestión de Usuarios</title>
    <link rel="stylesheet" href="estilo.css" />
    <link rel="stylesheet" href="auth_ui.css" />
    <style>
        .admin-wrap {
            height: 100vh;
            overflow: auto;
        }
        .admin-page {
            width: min(1100px, 94%);
            margin: 22px auto 42px;
        }
        .admin-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }
        .admin-head h1 {
            font-size: clamp(1.4rem, 1.05rem + 1.2vw, 2rem);
            font-weight: 780;
            letter-spacing: -0.03em;
        }
        .admin-head p {
            margin-top: 6px;
            color: var(--muted2);
            font-size: var(--fs-sm);
        }
        .admin-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--r-lg);
            box-shadow: var(--shadow-sm);
            padding: 16px;
            margin-top: 14px;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }
        @media (max-width: 820px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
        }
        label {
            display: block;
            font-size: var(--fs-xs);
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted2);
            margin-bottom: 6px;
        }
        input, select {
            width: 100%;
            min-height: 42px;
            border-radius: 12px;
            border: 1px solid var(--line);
            padding: 10px 12px;
            font-size: var(--fs-md);
            outline: none;
            background: #fff;
        }
        input:focus, select:focus {
            border-color: rgba(37, 99, 235, 0.55);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
        }
        .row-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: flex-end;
            margin-top: 12px;
        }
        .btn {
            appearance: none;
            border: 1px solid var(--line2);
            background: rgba(255,255,255,0.92);
            color: var(--ink);
            border-radius: 999px;
            padding: 10px 14px;
            font-weight: 740;
            cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            border-color: rgba(37, 99, 235, 0.35);
        }
        .btn-danger {
            background: rgba(239, 68, 68, 0.10);
            border-color: rgba(239, 68, 68, 0.25);
            color: #991b1b;
        }
        .msg {
            margin-top: 10px;
            font-size: var(--fs-sm);
            color: var(--muted);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--line);
            font-size: var(--fs-sm);
            text-align: left;
        }
        th {
            color: var(--muted2);
            font-size: var(--fs-xs);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-weight: 700;
        }
        .pill {
            display: inline-flex;
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid rgba(37, 99, 235, 0.18);
            background: rgba(37, 99, 235, 0.08);
            color: #1d4ed8;
            font-weight: 700;
            font-size: var(--fs-xs);;
        }
        .pill.off {
            border-color: rgba(100, 116, 139, 0.25);
            background: rgba(100, 116, 139, 0.10);
            color: #334155;
        }
        .top-links a {
            font-size: var(--fs-sm);
            font-weight: 720;
            color: var(--accent);
            text-decoration: none;
        }

        .u-username {
            font-weight: 650;
            color: var(--ink);
        }
    </style>
</head>
<body>
    <div class="admin-wrap">
        <div class="admin-page">
            <div class="admin-head">
                <div>
                    <h1>Gestión de Usuarios</h1>
                    <p>Solo rol <strong>admin</strong>. Requiere JWT en <code>localStorage.token</code>.</p>
                </div>
                <div class="top-links">
                    <a href="index.html">Volver al menú</a>
                </div>
            </div>

            <section class="admin-card">
                <h2 style="font-size: var(--fs-xl); font-weight: 780; margin-bottom: 10px;">Crear usuario</h2>
                <form id="form_usuario">
                    <div class="grid-3">
                        <div>
                            <label>Username</label>
                            <input id="u_username" required />
                        </div>
                        <div>
                            <label>Nombre</label>
                            <input id="u_nombre" required />
                        </div>
                        <div>
                            <label>Apellido</label>
                            <input id="u_apellido" required />
                        </div>
                    </div>
                    <div class="grid-2" style="margin-top: 10px;">
                        <div>
                            <label>Email</label>
                            <input id="u_email" type="email" required />
                        </div>
                        <div>
                            <label>Password</label>
                            <input id="u_password" type="password" required />
                        </div>
                    </div>
                    <div class="grid-2" style="margin-top: 10px;">
                        <div>
                            <label>Rol</label>
                            <select id="u_rol" required>
                                <option value="viewer">viewer</option>
                                <option value="editor">editor</option>
                                <option value="admin">admin</option>
                            </select>
                        </div>
                        <div class="row-actions">
                            <button class="btn btn-primary" type="submit">Crear usuario</button>
                        </div>
                    </div>
                    <div id="msg_form" class="msg"></div>
                </form>
            </section>

            <section class="admin-card">
                <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
                    <h2 style="font-size: var(--fs-xl); font-weight: 780;">Usuarios</h2>
                    <button class="btn" id="btn_refrescar" type="button">Refrescar</button>
                </div>
                <div style="overflow:auto; margin-top: 10px;">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>Nombre</th>
                                <th>Apellido</th>
                                <th>Email</th>
                                <th>Rol</th>
                                <th>Estado</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="tbody_usuarios"></tbody>
                    </table>
                </div>
                <div id="msg_tabla" class="msg"></div>
            </section>
        </div>
    </div>

    <script src="auth_ui.js"></script>
    <script>
        function getToken() {
            return localStorage.getItem("token") || "";
        }

        async function apiFetch(url, opts = {}) {
            const token = getToken();
            const headers = Object.assign({}, opts.headers || {}, {
                "Authorization": `Bearer ${token}`
            });
            return fetch(url, Object.assign({}, opts, { headers }));
        }

        function setMsg(id, text, isError = false) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = text || "";
            el.style.color = isError ? "#b91c1c" : "var(--muted)";
        }

        function filaUsuario(u) {
            const estadoPill = (String(u.estado || "").toLowerCase() === "activo")
                ? `<span class="pill">activo</span>`
                : `<span class="pill off">${u.estado || "-"}</span>`;

            const safe = (v) => (v === null || v === undefined) ? "" : String(v);
            return `
                <tr>
                    <td>${safe(u.id)}</td>
                    <td><span class="u-username">${safe(u.username)}</span></td>
                    <td>${safe(u.nombre)}</td>
                    <td>${safe(u.apellido)}</td>
                    <td>${safe(u.email)}</td>
                    <td><span class="pill">${safe(u.rol)}</span></td>
                    <td>${estadoPill}</td>
                    <td style="text-align:right;">
                        <button class="btn btn-danger" data-del="${safe(u.id)}" type="button">Eliminar</button>
                    </td>
                </tr>
            `;
        }

        async function cargarUsuarios() {
            setMsg("msg_tabla", "Cargando...");
            const res = await apiFetch("/api/usuarios");
            const data = await res.json().catch(() => null);
            if (!res.ok) {
                setMsg("msg_tabla", data?.error || `Error (HTTP ${res.status})`, true);
                return;
            }
            const tbody = document.getElementById("tbody_usuarios");
            tbody.innerHTML = data.map(filaUsuario).join("") || "";
            setMsg("msg_tabla", `${data.length} usuarios.`);
        }

        async function crearUsuario(e) {
            e.preventDefault();
            setMsg("msg_form", "");

            const payload = {
                username: document.getElementById("u_username").value.trim(),
                nombre: document.getElementById("u_nombre").value.trim(),
                apellido: document.getElementById("u_apellido").value.trim(),
                email: document.getElementById("u_email").value.trim(),
                password: document.getElementById("u_password").value,
                rol: document.getElementById("u_rol").value
            };

            const res = await apiFetch("/api/usuarios", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const data = await res.json().catch(() => null);
            if (!res.ok) {
                setMsg("msg_form", data?.error || `Error (HTTP ${res.status})`, true);
                return;
            }

            setMsg("msg_form", `Usuario creado: ${data.username} (#${data.id_usuario}).`);
            document.getElementById("form_usuario").reset();
            await cargarUsuarios();
        }

        async function eliminarUsuario(id) {
            if (!confirm("¿Eliminar usuario? (se marcará como inactivo)")) return;
            const res = await apiFetch(`/api/usuarios/${id}`, { method: "DELETE" });
            const data = await res.json().catch(() => null);
            if (!res.ok) {
                alert(data?.error || `Error (HTTP ${res.status})`);
                return;
            }
            await cargarUsuarios();
        }

        document.getElementById("btn_refrescar").addEventListener("click", cargarUsuarios);
        document.getElementById("form_usuario").addEventListener("submit", crearUsuario);

        document.getElementById("tbody_usuarios").addEventListener("click", (e) => {
            const btn = e.target.closest("[data-del]");
            if (!btn) return;
            eliminarUsuario(btn.getAttribute("data-del"));
        });

        cargarUsuarios();
    </script>
</body>
</html>
